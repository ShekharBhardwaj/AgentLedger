services:

  # SQLite — zero setup, good for a single machine
  agentledger:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./data:/data
    environment:
      - AGENTLEDGER_UPSTREAM_URL=${AGENTLEDGER_UPSTREAM_URL:-https://api.openai.com}
      - AGENTLEDGER_DSN=sqlite:////data/agentledger.db
      - AGENTLEDGER_API_KEY=${AGENTLEDGER_API_KEY:-}
      - AGENTLEDGER_BUDGET_SESSION=${AGENTLEDGER_BUDGET_SESSION:-}
      - AGENTLEDGER_BUDGET_AGENT=${AGENTLEDGER_BUDGET_AGENT:-}
      - AGENTLEDGER_BUDGET_DAILY=${AGENTLEDGER_BUDGET_DAILY:-}

