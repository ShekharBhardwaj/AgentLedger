name: Feature request
description: Suggest a new capability or improvement
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: Describe the use case or pain point, not just the solution.
      placeholder: As someone running agents in production, I need ...
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like AgentLedger to do?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches or existing tools you've looked at.
  - type: dropdown
    id: area
    attributes:
      label: Area
      multiple: true
      options:
        - Proxy / capture
        - Dashboard / UI
        - Storage / scale
        - Security / compliance
        - Integrations (providers, OTel, webhooks)
        - MCP
        - Other
